        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .nav-link { font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; transition: 0.3s; }
        .nav-link:hover { color: #ccff00; }
        .active-link { color: #ccff00; border-bottom: 2px solid #ccff00; }
        input, textarea { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ccff00 !important; outline: none; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-6 py-5 bg-black/90 sticky top-0 z-50 border-b border-white/10">
        <div class="text-3xl font-black italic">107<span class="text-[#ccff00]">d</span></div>
        <div class="hidden md:flex space-x-8">
            <a href="index.html" class="nav-link">Inicio</a>

        </div>

    </nav>

    <section class="py-20 px-6 max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black uppercase italic mb-4">Cuentame de tu proyecto</h2>
            <p class="text-gray-400">Enviame tus datos y me pondre en contacto a la brevedad.</p>
        </div>

        <form action="#" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-[#ccff00]">Nombre</label>
                    <input type="text" class="w-full p-4 rounded-xl" placeholder="Tu nombre">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-[#ccff00]">WhatsApp</label>
                    <input type="text" class="w-full p-4 rounded-xl" placeholder="+56 9 ...">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 text-[#ccff00]">Mensaje</label>
                <textarea rows="5" class="w-full p-4 rounded-xl" placeholder="¿En qué te puedo ayudar?"></textarea>
            </div>
            <button class="w-full bg-[#ccff00] text-black font-black py-4 rounded-xl uppercase tracking-widest hover:scale-[1.02] transition">
                Enviar tu consulta 
            </button>
        </form>
